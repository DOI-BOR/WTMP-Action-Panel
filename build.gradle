plugins {
    id "java-library"
    id "maven-publish"
}

dependencies {
    def rootProject = project(":");
    // API Dependencies
    api "mil.army.usace.hec.wat:hec-wat:${rootProject.wat_version}!!"

    // JasperReports
    api 'net.sf.jasperreports:jasperreports:6.19.0'
    api 'net.sf.jasperreports:jasperreports-chart-themes:6.19.0'
    implementation 'net.sf.jasperreports:jasperreports-chart-customizers:6.19.0'
    implementation 'net.sf.jasperreports:jasperreports-fonts:6.19.0'
    implementation 'net.sf.jasperreports:jasperreports-custom-visualization:6.19.0'
    implementation 'net.sf.jasperreports:jasperreports-functions:6.19.0'
    implementation 'net.sf.jasperreports:jasperreports-annotation-processors:6.19.0'
    implementation 'net.sf.jasperreports:jasperreports-metadata:6.19.0'
	implementation 'org.apache.poi:poi:3.8'
	implementation 'org.apache.poi:poi-ooxml:3.8'

    // Implementation/Runtime Dependencies
    implementation project(":usbr-git-library")
    implementation 'mil.army.usace.hec.wat:wat-cequalw2-plugin:v1.1-2.0.0.1149-20210903.004433-1'
    implementation 'org.eclipse.jgit:org.eclipse.jgit:5.13.0.202109080827-r'
    implementation 'org.gitlab4j:gitlab4j-api:4.19.0'
    implementation 'mil.army.usace.hec.swingx:swingx-core:1.6.6'
    implementation 'gov.usbr.wq:merlin-data-exchange:2.1.0'
    //implementation files('C:\\Users\\bryson\\.m2\\repository\\gov\\usbr\\wq\\merlin-data-exchange\\feature-profile_updates_with_xlsx-SNAPSHOT\\merlin-data-exchange-feature-profile_updates_with_xlsx-SNAPSHOT.jar')
    implementation 'gov.usbr.wq:merlin-web-client:4.4.0'
    implementation 'com.fasterxml.jackson.dataformat:jackson-dataformat-csv:2.13.1'
    runtimeOnly 'org.codehaus.groovy:groovy:3.0.7'
    runtimeOnly 'jaxen:jaxen:1.1.6'
    runtimeOnly 'org.springframework:spring-beans:5.3.12'
    runtimeOnly 'org.springframework:spring-core:5.3.12'
    runtimeOnly 'org.springframework:spring-jcl:5.3.12'
}


jar {
    manifest {
        attributes("WatPluginMainClass": "usbr.wat.plugins.actionpanel.ActionPanelPlugin")
    }
}

publishing {
    publications {
        mavenJava(MavenPublication) {
            artifactId = "usbr-actionpanel-plugin"
            from components.java
        }
    }
}

compileJava {
    sourceCompatibility = 1.8
    targetCompatibility = 1.8
}